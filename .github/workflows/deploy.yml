name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy dist/ to server
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_DIR: ${{ secrets.DIRECTORY }}
        run: |
          # Adiciona .htaccess no dist antes de zipar
          cat > dist/.htaccess << 'HTACCESS'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteRule ^ index.html [QSA,L]
          HTACCESS

          # Zipa só o dist/
          cd dist && zip -r ../dist.zip . && cd ..

          # Envia o zip
          scp -P $SSH_PORT -o StrictHostKeyChecking=no \
            dist.zip $USERNAME@$HOST:~/dist.zip

          # Extrai no servidor e limpa
          ssh -p $SSH_PORT -o StrictHostKeyChecking=no $USERNAME@$HOST << EOF
            rm -rf $DEPLOY_DIR/*
            unzip -o ~/dist.zip -d $DEPLOY_DIR/
            rm ~/dist.zip
            echo "✅ Deploy concluído"
          EOF

      - name: Notify
        run: echo "✅ Deploy concluído em $(date)"